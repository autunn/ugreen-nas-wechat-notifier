name: Build and Push Docker Image

on:
  push:
    branches: 
      - main
      - master
  workflow_dispatch:

# 消除 Node.js 20 弃用警告的环境变量
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set current date
        run: echo "BUILD_DATE=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          build-args: |
            APP_VERSION=${{ env.BUILD_DATE }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nasnotify-go:latest
            ghcr.io/${{ github.repository_owner }}/nasnotify-go:${{ env.BUILD_DATE }}