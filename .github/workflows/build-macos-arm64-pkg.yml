name: Build macOS arm64 PKG

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Set version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "APP_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=v$(date +'%Y.%m.%d')" >> "$GITHUB_ENV"
          fi

      - name: Build darwin arm64 binary
        run: |
          mkdir -p dist/nasnotify-go/{config,data}
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -ldflags "-s -w -X main.Version=${APP_VERSION}" \
            -o dist/nasnotify-go/nasnotify-go-app ./cmd/nasnotify

          cp -R templates dist/nasnotify-go/
          chmod +x dist/nasnotify-go/nasnotify-go-app

      - name: Add launch script
        run: |
          cat > dist/nasnotify-go/start.sh <<'EOF'
          #!/bin/bash
          cd /Applications/nasnotify-go
          ./nasnotify-go-app
          EOF
          chmod +x dist/nasnotify-go/start.sh

      - name: Build pkg
        run: |
          mkdir -p pkgroot/Applications
          cp -R dist/nasnotify-go pkgroot/Applications/nasnotify-go

          pkgbuild \
            --root pkgroot \
            --identifier com.nasnotify.go \
            --version "${APP_VERSION#v}" \
            --install-location / \
            nasnotify-go-macos-arm64.pkg

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasnotify-go-macos-arm64-pkg
          path: nasnotify-go-macos-arm64.pkg

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: nasnotify-go-macos-arm64-portable
          path: dist/nasnotify-go