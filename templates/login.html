<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>登录 - NasNotify Go</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #f3f7ff;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary2: #06b6d4;
      --soft: #eff6ff;
      --danger-bg: #fef2f2;
      --danger-border: #fecaca;
      --danger-text: #991b1b;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.22), transparent 32%),
        radial-gradient(circle at top right, rgba(6, 182, 212, 0.22), transparent 28%),
        linear-gradient(135deg, #f8fbff 0%, var(--bg) 100%);
      padding: 28px;
    }

    .layout {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: start;
    }

    .hero {
      position: sticky;
      top: 28px;
      min-height: calc(100vh - 56px);
      padding: 32px;
      border-radius: 30px;
      color: white;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(125, 211, 252, 0.45), transparent 30%),
        linear-gradient(160deg, #0f172a 0%, #1d4ed8 55%, #0891b2 100%);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 42px;
    }

    .brand-icon {
      width: 56px;
      height: 56px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
    }

    .brand-icon svg {
      width: 36px;
      height: 36px;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .brand-subtitle {
      margin-top: 3px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.68);
    }

    .hero h1 {
      margin: 0;
      font-size: 38px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 18px 0 0;
      color: rgba(255, 255, 255, 0.76);
      line-height: 1.8;
      font-size: 15px;
    }

    .steps {
      margin-top: 36px;
      display: grid;
      gap: 14px;
    }

    .step {
      display: flex;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(12px);
    }

    .step-num {
      width: 26px;
      height: 26px;
      flex: 0 0 26px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 900;
      background: rgba(255, 255, 255, 0.22);
    }

    .step-title {
      font-size: 14px;
      font-weight: 800;
    }

    .step-desc {
      margin-top: 3px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.62);
    }

    .version {
      position: absolute;
      left: 32px;
      bottom: 28px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.52);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .panel {
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(226, 232, 240, 0.8);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(16px);
    }

    .panel-header {
      padding: 30px 34px 22px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,255,255,0.72));
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .panel-desc {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    form {
      padding: 30px 34px 34px;
    }

    .error {
      margin-bottom: 16px;
      padding: 13px 15px;
      border-radius: 16px;
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
      color: var(--danger-text);
      font-size: 13px;
      line-height: 1.5;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 12px;
      font-weight: 800;
      color: #475569;
    }

    input[type="password"] {
      width: 100%;
      height: 46px;
      padding: 0 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.9);
      color: var(--text);
      outline: none;
      font-size: 14px;
      transition: 0.18s ease;
    }

    input::placeholder {
      color: #a8b2c3;
    }

    input:focus {
      border-color: rgba(37, 99, 235, 0.7);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
      background: white;
    }

    .actions {
      margin-top: 22px;
    }

    button {
      width: 100%;
      height: 50px;
      border: 0;
      border-radius: 16px;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary2));
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 32px rgba(37, 99, 235, 0.24);
      transition: 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 38px rgba(37, 99, 235, 0.3);
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 11px;
      color: #94a3b8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    @media (max-width: 960px) {
      body {
        padding: 18px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .hero {
        position: relative;
        top: 0;
        min-height: auto;
      }

      .hero h1 {
        font-size: 30px;
      }

      .version {
        position: static;
        margin-top: 28px;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
        background: #f8fafc;
      }

      .layout {
        gap: 0;
      }

      .hero {
        border-radius: 0 0 28px 28px;
      }

      .panel {
        margin-top: -14px;
        border-radius: 28px 28px 0 0;
        box-shadow: none;
        border-left: 0;
        border-right: 0;
      }

      .panel-header,
      form {
        padding-left: 20px;
        padding-right: 20px;
      }
    }
  </style>
</head>

<body>
  <main class="layout">
    <aside class="hero">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 64 64" fill="none" aria-hidden="true">
            <rect x="12" y="18" width="31" height="34" rx="8" fill="rgba(255,255,255,0.92)"/>
            <rect x="18" y="25" width="18" height="5" rx="2.5" fill="#2563eb"/>
            <rect x="18" y="35" width="18" height="5" rx="2.5" fill="#06b6d4"/>
            <circle cx="22" cy="47" r="3" fill="#22c55e"/>
            <path d="M45 18c6 0 11 5 11 11v6c0 2 1 4 3 6H31c2-2 3-4 3-6v-6c0-6 5-11 11-11Z" fill="#7dd3fc"/>
            <path d="M40 45c1 3 3 5 5 5s4-2 5-5" stroke="white" stroke-width="4" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="brand-title">NasNotify Go</div>
          <div class="brand-subtitle">NAS 聚合通知中心</div>
        </div>
      </div>

      <h1>欢迎回来</h1>
      <p>
        使用管理员密码进入后台，继续管理企业微信、NAS 节点和消息推送。
      </p>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div>
            <div class="step-title">登录后台</div>
            <div class="step-desc">管理员密码只用于当前会话登录。</div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">2</div>
          <div>
            <div class="step-title">调整配置</div>
            <div class="step-desc">敏感字段不会回显，留空表示保持原值。</div>
          </div>
        </div>

        <div class="step">
          <div class="step-num">3</div>
          <div>
            <div class="step-title">测试通知</div>
            <div class="step-desc">保存后可以直接发送测试消息验证链路。</div>
          </div>
        </div>
      </div>

      <div class="version">{{.version}}</div>
    </aside>

    <section class="panel">
      <div class="panel-header">
        <div class="tag">后台登录</div>
        <h2 class="panel-title">进入控制台</h2>
        <p class="panel-desc">请输入管理员密码继续操作。</p>
      </div>

      <form action="/login" method="POST">
        {{if .error}}<div class="error">{{.error}}</div>{{end}}

        <div class="field full">
          <label for="password">管理员密码</label>
          <input type="password" id="password" name="password" placeholder="请输入管理员密码" required autofocus autocomplete="current-password">
        </div>

        <div class="actions">
          <button type="submit">进入控制台</button>
        </div>

        <div class="footer">{{.version}}</div>
      </form>
    </section>
  </main>
</body>
</html>
