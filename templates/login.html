<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 聚合通知中心</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #f4f6f9; font-family: sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 300px; text-align: center; }
        .header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .logo { height: 32px; width: 32px; object-fit: contain; border-radius: 6px; }
        h3 { margin: 0; color: #1e293b; font-size: 22px; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: #1e293b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        button:hover { background: #334155; }
        .error { color: #ef4444; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="header">
            <h3>聚合通知中心</h3>
        </div>
        {{if .error}}<div class="error">{{.error}}</div>{{end}}
        <form action="/login" method="POST">
            <input type="password" name="password" placeholder="请输入管理员密码" required autofocus>
            <button type="submit">进入控制台</button>
        </form>
        <div style="color:#cbd5e1; font-size:11px; margin-top:25px; font-family: monospace;">{{.version}}</div>
    </div>
</body>
</html>
